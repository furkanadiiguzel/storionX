services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: devpassword
      MYSQL_DATABASE: migration_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pdevpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  mockstorionx:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: mockstorionx
      args:
        PROJECT_PATH: src/Migration.MockStorionX/Migration.MockStorionX.csproj
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: api
      args:
        PROJECT_PATH: src/Migration.Api/Migration.Api.csproj
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data:ro
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Server=mysql;Port=3306;Database=migration_db;User=root;Password=devpassword;"
      StorionXClient__BaseUrl: "http://mockstorionx:8080"
    depends_on:
      mysql:
        condition: service_healthy
      mockstorionx:
        condition: service_started
    restart: unless-stopped

  # One-off seed tool — run with: docker compose run --rm generator -- --seed 42
  # profiles: [tools] keeps it out of `docker compose up` but allows `run`
  generator:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: generator
      args:
        PROJECT_PATH: src/Migration.MockEv.Generator/Migration.MockEv.Generator.csproj
    volumes:
      - ./data:/data
    environment:
      ConnectionStrings__Default: "Server=mysql;Port=3306;Database=migration_db;User=root;Password=devpassword;"
    depends_on:
      mysql:
        condition: service_healthy
    profiles:
      - tools

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8080
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mysql_data:
