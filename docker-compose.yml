services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: devpassword
      MYSQL_DATABASE: migration_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pdevpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  mockstorionx:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: mockstorionx
      args:
        PROJECT_PATH: src/Migration.MockStorionX/Migration.MockStorionX.csproj
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: api
      args:
        PROJECT_PATH: src/Migration.Api/Migration.Api.csproj
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Server=mysql;Port=3306;Database=migration_db;User=root;Password=devpassword;"
    depends_on:
      mysql:
        condition: service_healthy
      mockstorionx:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      dockerfile: ../../docker/frontend.Dockerfile
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    restart: unless-stopped

volumes:
  mysql_data:
